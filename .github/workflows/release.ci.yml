name: RELEASE_CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HUSKY: 0

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          pnpm lint
          pnpm depcruise
          pnpm lint:unused

      - name: Build
        run: pnpm build

      - name: Test
        run: |
          pnpm test
          pnpm test:cov

      - name: Upload Coverage
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push'
        with:
          name: dist
          path: dist/

  repo-update:
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm install --frozen-lockfile

      - name: Changeset
        run: pnpm changeset version
      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "VERSION BUMP"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Depbadge
        uses: ehildt/depbadge@v1

      - name: Commit badge bump
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "BADGE BUMP"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wiki:
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki

      - name: Sync wiki
        run: |
          test -d .wiki || { echo "::error::.wiki folder missing"; exit 1; }
          rsync -a --delete --exclude '.git/' .wiki/ wiki/

      - name: Commit wiki
        working-directory: wiki
        run: |
          git config user.name "wiki[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "WIKI UPDATE"
          git push

  publish:
    if: github.event_name == 'push'
    needs: [repo-update, wiki]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ensure we can see the latest commits

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Version bump & publish
        run: |
          # Apply changeset version bump locally
          pnpm changeset version

          # Reinstall to update lockfile after version bump
          pnpm install --frozen-lockfile

          # Publish to npm directly using the bumped version
          pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
