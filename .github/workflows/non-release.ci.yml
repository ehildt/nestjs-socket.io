name: NON_RELEASE_CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches-ignore: [main]

env:
  HUSKY: 0

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          pnpm lint
          pnpm depcruise
          pnpm lint:unused

      - name: Build
        run: pnpm build

      - name: Test
        run: |
          pnpm test
          pnpm test:cov
