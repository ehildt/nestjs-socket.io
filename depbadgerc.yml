integrity: de10f6c5466546b0a72a58452324afe5aef13b9dc2b773f2c9e58a8e5c9239af
# yaml-language-server: $schema=https://raw.githubusercontent.com/ehildt/depbadge/refs/heads/main/depbadgerc.schema.json

target: README.md

manifest: package.json

output:
  - markdown

dependenciesLayout: &DEPENDENCIES_LAYOUT
  position: center
  showHeader: false

dependenciesStyle: &DEPENDENCIES_STYLE
  labelColor: "333"
  isError: false
  namedLogo: npm
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600

statusBadgesStyle: &STATUS_BADGES_STYLE
  labelColor: "333"
  isError: false
  namedLogo: npm
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600

peerDependencies:
  layout:
    <<: *DEPENDENCIES_LAYOUT
    header: PeerDependencies
    showHeader: true
    position: center
  badgeStyle:
    <<: *DEPENDENCIES_STYLE
    style: flat
  items:
    - name: "@nestjs/common"
      namedLogo: npm
      link: https://github.com/nestjs/nest
    - name: "socket.io"
      namedLogo: npm
      link: https://github.com/socketio/socket.io
    - name: joi
      namedLogo: npm
      link: https://github.com/sideway/joi

dependencies:
  items: []

devDependencies:
  layout:
    <<: *DEPENDENCIES_LAYOUT
    header: DevDependencies
    showHeader: true
    position: center
  badgeStyle:
    <<: *DEPENDENCIES_STYLE
    style: flat-square
  items:
    - name: "@changesets/cli"
      namedLogo: npm
      link: https://github.com/changesets/changesets
    - name: "@eslint/js"
      namedLogo: npm
      link: https://github.com/eslint/eslint
    - name: "@nestjs/testing"
      namedLogo: npm
      link: https://github.com/nestjs/nest
    - name: "@types/eslint"
      namedLogo: eslint
      link: https://github.com/DefinitelyTyped/DefinitelyTyped
    - name: "@types/node"
      namedLogo: node
      link: https://github.com/DefinitelyTyped/DefinitelyTyped
    - name: "@vitest/coverage-v8"
      namedLogo: vitest
      link: https://github.com/vitest-dev/vitest
    - name: depcheck
      namedLogo: npm
      link: https://github.com/depcheck/depcheck
    - name: dependency-cruiser
      namedLogo: npm
      link: https://github.com/sverweij/dependency-cruiser
    - name: eslint
      namedLogo: eslint
      link: https://github.com/eslint/eslint
    - name: eslint-config-prettier
      namedLogo: prettier
      link: https://github.com/prettier/eslint-config-prettier
    - name: eslint-plugin-prettier
      namedLogo: prettier
      link: https://github.com/prettier/eslint-plugin-prettier
    - name: eslint-plugin-simple-import-sort
      namedLogo: npm
      link: https://github.com/lydell/eslint-plugin-simple-import-sort
    - name: eslint-plugin-sonarjs
      namedLogo: sonar
      link: https://github.com/SonarSource/eslint-plugin-sonarjs
    - name: globals
      namedLogo: npm
      link: https://github.com/sindresorhus/globals
    - name: husky
      namedLogo: husky
      link: https://github.com/typicode/husky
    - name: jiti
      namedLogo: npm
      link: https://github.com/unjs/jiti
    - name: lint-staged
      namedLogo: npm
      link: https://github.com/lint-staged/lint-staged
    - name: npm-check-updates
      namedLogo: npm
      link: https://github.com/raineorshine/npm-check-updates
    - name: rimraf
      namedLogo: npm
      link: https://github.com/isaacs/rimraf
    - name: ts-unused-exports
      namedLogo: npm
      link: https://github.com/pinterest/ts-unused-exports
    - name: tsup
      namedLogo: npm
      link: https://github.com/egoist/tsup
    - name: typescript-eslint
      namedLogo: eslint
      link: https://github.com/typescript-eslint/typescript-eslint
    - name: vitest
      namedLogo: vitest
      link: https://github.com/vitest-dev/vitest

statusBadges:
  layout:
    position: center
    showHeader: true
    header: StatusBadges
  badgeStyle: *STATUS_BADGES_STYLE
  items:
    - name: github
      metric: release
      user: ehildt
      repo: nestjs-socket.io
      branch: main
      namedLogo: github
    - name: github
      metric: stars
      user: ehildt
      repo: nestjs-socket.io
      branch: main
      namedLogo: github
    - name: github
      metric: license
      user: ehildt
      repo: nestjs-socket.io
      branch: main
      namedLogo: github
